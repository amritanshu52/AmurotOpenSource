name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Lint jobs are advisory. They annotate the code with warnings but never
# block a merge or a deployment. Contributors should read the annotations
# and learn from them, but a lint warning will not block a PR.

jobs:
  lint-html:
    name: HTML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint HTML (advisory)
        run: npm run lint:html
        continue-on-error: true

  lint-css:
    name: CSS Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint CSS (advisory)
        run: npm run lint:css
        continue-on-error: true

  lint-js:
    name: JavaScript Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint JavaScript (advisory)
        run: npm run lint:js
        continue-on-error: true
