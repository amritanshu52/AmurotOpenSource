<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contributors — AmurotOpenSource</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    .contributors-page {
      max-width: 1000px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }

    .contributors-page h1 {
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .page-subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 3rem;
    }

    .people-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.2rem;
      margin-bottom: 3rem;
    }

    .person-card {
      background-color: #f9f9ff;
      border: 1px solid #e8e8f0;
      border-radius: 10px;
      padding: 1.5rem;
      text-align: center;
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .person-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(108, 99, 255, 0.12);
      text-decoration: none;
    }

    .person-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background-color: #6c63ff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: white;
      font-weight: 700;
      margin: 0 auto 0.8rem;
    }

    .person-card h3 {
      font-size: 1rem;
      margin-bottom: 0.2rem;
    }

    .person-card .persons-username {
      font-size: 0.85rem;
      color: #6c63ff;
    }

    .add-yours {
      text-align: center;
      background-color: #f5f4ff;
      border-radius: 12px;
      padding: 2.5rem;
    }

    .add-yours h2 {
      margin-bottom: 0.5rem;
    }

    .add-yours p {
      color: #666;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">
      <a href="../index.html">AmurotOpenSource</a>
    </div>
    <ul class="nav-links">
      <li><a href="../index.html#contribute">Contribute</a></li>
      <li><a href="../docs/getting-started.html">Docs</a></li>
    </ul>
  </nav>

  <main class="contributors-page">
    <h1>Contributors</h1>
    <p class="page-subtitle">Everyone who has contributed to AmurotOpenSource.</p>

    <div class="people-grid">
      <a href="bhaskar/" class="person-card">
        <div class="person-avatar">B</div>
        <h3>Bhaskar</h3>
        <span class="persons-username">@BinaryBhaskar</span>
      </a>
      <a href="ayush/" class="person-card">
        <div class="person-avatar">A</div>
        <h3>Ayush</h3>
        <span class="persons-username">@ArjunaAyush</span>
      </a>
      <!-- New contributor cards are added here as PRs are merged -->
       <a href="riya/" class="person-card">
        <div class="person-avatar">R</div>
        <h3>Riya</h3>
        <span class="persons-username">@riyajnv</span>
      </a>
    </div>

    <div class="add-yours">
      <h2>Your name belongs here</h2>
      <p>Follow the guide to create your contributor page and join this list.</p>
      <a href="../docs/getting-started.html" class="btn-primary">Get Started</a>
    </div>
  </main>
</body>
</html>
